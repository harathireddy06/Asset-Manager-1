kind = "web"
previewPath = "/"
title = "Telangana Bus Tracker"
version = "1.0.0"
id = "artifacts/transport-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18982
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/transport-tracker run dev"

[services.env]
PORT = "18982"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/transport-tracker", "run", "build"]
publicDir = "artifacts/transport-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
